#!name=小红书-精简低开销版
#!desc=去广告 + 保留推荐流（无JS脚本，降低发热/耗电）
#!author=优化版
#!date=2026-05-01

#############################################
# 广告域名（无需 MITM，几乎0开销）

host, ads-img-qc.xhscdn.com, reject
host, ads-video-al.xhscdn.com, reject
host, ads-video-qc.xhscdn.com, reject
host, t-ads.xiaohongshu.com, reject

#############################################
# 弹窗 / 广告接口（需 MITM，但很轻）

^https?:\/\/edith\.xiaohongshu\.com\/api\/sns\/v\d+\/surprisebox\/(get_style|open|submit_action) url reject-dict
^https?:\/\/edith\.xiaohongshu\.com\/api\/sns\/v\d+\/note\/guide\? url reject-dict
^https?:\/\/edith\.xiaohongshu\.com\/api\/sns\/v\d+\/guide\/user_banner url reject-dict

#############################################
# 搜索 & 推荐流（jsonjq：中等开销，但远低于 JS

# 首页推荐流：仅保留 normal 内容
^https:\/\/so\.xiaohongshu\.com\/api\/sns\/v\d+\/search\/notes url jsonjq-response-body '.data.items |= map(select(.note?.type == "normal"))'

^https:\/\/rec\.xiaohongshu\.com\/api\/sns\/v\d+\/homefeed url jsonjq-response-body '.data |= map(select(.type == "normal"))'

#############################################
# 水印拦截

^https?:\/\/ci\.xiaohongshu\.com\/system_config\/watermark url reject-img

#############################################
# 精确 MITM（关键优化点）

hostname = edith.xiaohongshu.com, rec.xiaohongshu.com, ci.xiaohongshu.com, so.xiaohongshu.com
